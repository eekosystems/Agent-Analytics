name: langfuse-organizations
docs: |
  ## General Notes

  This admin API is only available on self-hosted instances, not on Active Trace Cloud.
  An administrator must set the `ADMIN_API_KEY` environment variable to use this API.

  ## Authentication

  Authenticate with the API by setting the Authorization header to `Bearer $ADMIN_API_KEY` where
  `$ADMIN_API_KEY` is the API key set via the container environment.

  ## Exports

  - OpenAPI spec: available at /generated/organizations-api/openapi.yml on your instance

  ## Looking for the Active Trace API?

  Are you looking for the full Active Trace API?
  Check out the full API reference.

error-discrimination:
  strategy: status-code
auth: bearer
imports:
  commons: commons.yml
errors:
  - commons.Error
  - commons.UnauthorizedError
  - commons.AccessDeniedError
  - commons.MethodNotAllowedError
