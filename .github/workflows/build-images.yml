name: Build Agent-Analytics images

# Builds the rebranded web + worker images on GitHub's runners (16 GB RAM) and
# pushes them to GHCR, so the Coolify server never has to compile from source.
# After this runs, point docker-compose.yaml at:
#   ghcr.io/eekosystems/agent-analytics-web:latest
#   ghcr.io/eekosystems/agent-analytics-worker:latest

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "worker/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/build-images.yml"
  workflow_dispatch: {}

concurrency:
  group: build-images
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            dockerfile: ./web/Dockerfile
            image: ghcr.io/eekosystems/agent-analytics-web
          - name: worker
            dockerfile: ./worker/Dockerfile
            image: ghcr.io/eekosystems/agent-analytics-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_LANGFUSE_CLOUD_REGION=
          cache-from: type=gha
          cache-to: type=gha,mode=max
