name: Build Active Trace images

# Builds the rebranded web + worker images on GitHub's runners (16 GB RAM) and
# pushes them to GHCR, so the Coolify server never has to compile from source.
# After this runs, point docker-compose.yaml at:
#   ghcr.io/eekosystems/agent-analytics-web:latest
#   ghcr.io/eekosystems/agent-analytics-worker:latest

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "worker/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/build-images.yml"
  workflow_dispatch: {}

concurrency:
  group: build-images
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            dockerfile: ./web/Dockerfile
            image: ghcr.io/eekosystems/agent-analytics-web
          - name: worker
            dockerfile: ./worker/Dockerfile
            image: ghcr.io/eekosystems/agent-analytics-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      # Private-repo runners are only 2 vCPU / 7 GB. The web Next.js build asks
      # for up to 75% of RAM as Node heap (web/Dockerfile), which starves the
      # runner and kills it ("lost communication with the server"). Free disk and
      # add swap so the build has headroom instead of OOM-ing.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Add swap space
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_LANGFUSE_CLOUD_REGION=
          cache-from: type=gha
          cache-to: type=gha,mode=max
