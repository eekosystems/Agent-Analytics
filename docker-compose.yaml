# Active Trace — Coolify deployment with prebuilt GHCR images.
# Coolify looks for /docker-compose.yaml by default, so this is named to match.
# Secrets are baked in because this repo is PRIVATE. Rotate before real customer use.
#
# The web/worker images (including Active Trace branding) are built by GitHub
# Actions and pulled from GHCR — NEVER built on the server. Building the Next.js
# monorepo on the box OOM-kills it. See DEPLOY_COOLIFY.md for image auth.
services:
  langfuse-worker:
    image: ghcr.io/eekosystems/agent-analytics-worker:latest
    # Force a registry pull on every deploy — without this, docker compose
    # reuses the stale local :latest and new builds never go live.
    pull_policy: always
    restart: always
    depends_on: &depends-on
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment: &common-env
      DATABASE_URL: postgresql://postgres:9435c79f6e29345d091e04cc6d4cff27@postgres:5432/postgres
      SALT: "KgauOUuSH56BCNF1Ib6EUveRiBxpErtQWmMOXTw/4C4="
      ENCRYPTION_KEY: be66aab4d66909870bd8b453e97ec4a67db99fee661aecb1507e76e6c08d7e7f
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: "14f30fe64ad2af1ff552489ca1897ab8"
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: "cda77959268717a272f19a5e63187a8f"
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: "cda77959268717a272f19a5e63187a8f"
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: "d04a0f57dd6dba54ebdf2f9204b3b3e1"
      REDIS_TLS_ENABLED: "false"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3030/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
      start_interval: 5s

  langfuse-web:
    image: ghcr.io/eekosystems/agent-analytics-web:latest
    pull_policy: always
    restart: always
    depends_on: *depends-on
    expose:
      - "3000"
    environment:
      <<: *common-env
      HOSTNAME: 0.0.0.0
      NEXTAUTH_URL: http://okookwow8g4wko04s4cg4ogo.46.62.210.164.sslip.io
      NEXTAUTH_SECRET: "byp167hHUIiU/D9c58GhlEkU+RK9OslOombpW8cqA84="
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/public/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
      start_interval: 5s

  clickhouse:
    image: docker.io/clickhouse/clickhouse-server
    restart: always
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: "14f30fe64ad2af1ff552489ca1897ab8"
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s

  minio:
    image: cgr.dev/chainguard/minio
    restart: always
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: "cda77959268717a272f19a5e63187a8f"
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 1s

  redis:
    image: docker.io/redis:7
    restart: always
    command: >
      --requirepass d04a0f57dd6dba54ebdf2f9204b3b3e1
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  postgres:
    image: docker.io/postgres:17
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "9435c79f6e29345d091e04cc6d4cff27"
      POSTGRES_DB: postgres
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data

volumes:
  langfuse_postgres_data:
    driver: local
  langfuse_clickhouse_data:
    driver: local
  langfuse_clickhouse_logs:
    driver: local
  langfuse_minio_data:
    driver: local
